runConfig:
  # Cloud Run instance settings — tune after you see real traffic.
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0   # scales to zero when idle (keeps cost at $0 on low traffic)
  maxInstances: 10

env:
  # Runtime environment variables available to the Next.js server.
  # NEXT_PUBLIC_* vars are baked into the JS bundle at build time, so they
  # must be set here (or in the Firebase Console backend secret manager).
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: nidun-ai-firebase-api-key  # create this secret in Firebase Console
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: nidun-ai.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: nidun-ai
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: nidun-ai.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "178088560006"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:178088560006:web:8da06d5a9122baa7979807
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-GY7FJEGRNG
    availability:
      - BUILD
      - RUNTIME
